# Netlify build config for the Dishly Expo web app.
[build]
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  # Node 22+ is required: the static export prerenders routes in Node, and
  # @supabase/supabase-js needs a global WebSocket (added in Node 22).
  NODE_VERSION = "22"
  # Metro bundling a large Expo web app can exceed Node's default heap in CI.
  NODE_OPTIONS = "--max-old-space-size=4096"

# SPA fallback: serve real exported files first, otherwise hand off to the app
# shell so client-side routes (and refreshes on sub-routes) resolve.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
